*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
.nav{background:#111118;border-bottom:1px solid #22222e;padding:0 20px;display:flex;align-items:center;gap:4px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
.nav-logo{margin-right:auto;padding:14px 0;display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;text-decoration:none;color:#e8e8f0}
.nav-logo .ico{width:32px;height:32px;background:linear-gradient(135deg,#7c6af7,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.navbtn{border:none;background:none;color:#888;cursor:pointer;font-size:13px;font-weight:500;padding:16px 14px;border-bottom:2px solid transparent;transition:.15s;text-decoration:none;display:inline-flex;align-items:center}
.navbtn:hover{color:#e8e8f0}
.navbtn.on{color:#a78bfa;border-bottom-color:#a78bfa;font-weight:600}
.nav-hint{font-size:11px;color:#555;background:#1a1a2a;padding:5px 12px;border-radius:20px;margin-left:8px;white-space:nowrap}

/* GALLERY */
.gallery{padding:28px 24px;max-width:1000px;margin:0 auto}
.gallery-title{font-size:14px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.gcard{background:#0f0f18;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s}
.gcard:hover{border-color:rgba(255,255,255,.15);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.gcard-thumb{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gcard-thumb .big-num{font-size:64px;font-weight:900;opacity:.12;position:absolute}
.gcard-thumb .thumb-content{text-align:center;padding:16px;z-index:1}
.gcard-thumb .thumb-icon{font-size:32px;margin-bottom:8px;display:block}
.gcard-thumb .thumb-title{font-size:13px;font-weight:700;line-height:1.4;color:#fff}
.gcard-body{padding:14px}
.gcard-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.gcard-name{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:10px;color:#ccc}
.gcard-meta{display:flex;align-items:center;justify-content:space-between}
.gcard-slides{font-size:11px;color:#555}
.gcard-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;transition:.15s}

/* VIEWER */
.viewer{display:none;position:fixed;inset:0;background:#050508;z-index:100;flex-direction:column}
.viewer.open{display:flex}
.viewer-top{padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1a1a24;flex-shrink:0}
.viewer-top .back{background:#1a1a24;border:1px solid #2a2a38;color:#888;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.viewer-top .back:hover{color:#e8e8f0}
.viewer-top .vtitle{font-size:14px;font-weight:700;flex:1}
.viewer-top .vcounter{font-size:13px;color:#555;background:#1a1a24;padding:6px 14px;border-radius:8px;font-weight:600}
.viewer-top .vhint{font-size:11px;color:#444;padding:6px 12px;background:#111;border-radius:8px;display:flex;align-items:center;gap:5px}

/* SLIDE AREA */
.slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}
.slide-wrap{position:relative;width:min(560px,calc(100vmin - 120px));height:min(560px,calc(100vmin - 120px))}
.slide{position:absolute;inset:0;border-radius:16px;overflow:hidden;display:none;flex-direction:column;justify-content:space-between;padding:36px;opacity:0;transition:opacity .25s}
.slide.active{display:flex;opacity:1}

/* SLIDE INNER LAYOUTS */
.s-cover{background:linear-gradient(145deg,#0a0a14 0%,#12121f 100%)}
.s-middle{background:linear-gradient(145deg,#0a0a14 0%,#11111c 100%)}
.s-cta{background:linear-gradient(145deg,#0c0c18 0%,#14141f 100%)}

.s-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
.s-num{font-size:11px;font-weight:700;opacity:.3;letter-spacing:.5px}
.s-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.4px;text-transform:uppercase}

.s-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0}
.s-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:14px}
.s-title{font-size:clamp(22px,5vmin,32px);font-weight:900;line-height:1.15;margin-bottom:14px;letter-spacing:-.5px}
.s-title em{font-style:normal}
.s-text{font-size:clamp(14px,3vmin,17px);line-height:1.7;color:rgba(255,255,255,.7)}
.s-text strong{color:#fff;font-weight:700}
.s-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.s-list li{display:flex;align-items:flex-start;gap:10px;font-size:clamp(13px,2.8vmin,16px);line-height:1.5;color:rgba(255,255,255,.75)}
.s-list li .icon{flex-shrink:0;font-size:16px;margin-top:1px}
.s-divider{width:40px;height:3px;border-radius:2px;margin:16px 0}
.s-big{font-size:clamp(40px,10vmin,72px);font-weight:900;letter-spacing:-2px;line-height:1}
.s-big-sub{font-size:clamp(14px,3vmin,17px);color:rgba(255,255,255,.5);margin-top:6px}
.s-versus{display:flex;flex-direction:column;gap:8px}
.s-vs-row{background:rgba(255,255,255,.04);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;font-size:clamp(12px,2.5vmin,15px);line-height:1.5}
.s-vs-icon{flex-shrink:0;font-size:18px}
.s-highlight{background:rgba(255,255,255,.06);border-radius:12px;padding:16px;margin-top:8px;font-size:clamp(13px,2.8vmin,16px);line-height:1.6;color:rgba(255,255,255,.8)}
.s-accent-line{border-left:3px solid;padding-left:14px}

.s-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.s-handle{font-size:11px;font-weight:700;opacity:.4;letter-spacing:.3px}
.s-brand{font-size:11px;font-weight:700;opacity:.35;letter-spacing:.3px}
.s-dots{display:flex;gap:5px}
.s-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:.2s}
.s-dot.on{background:rgba(255,255,255,.6);width:14px;border-radius:3px}

/* NAV ARROWS */
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:10;border:none}
.nav-arrow:hover{background:rgba(255,255,255,.15);color:#fff}
.nav-prev{left:-52px}
.nav-next{right:-52px}
@media(max-width:700px){.nav-prev{left:-44px}.nav-next{right:-44px}}
.nav-arrow:disabled{opacity:.2;cursor:default}

/* VIEWER BOTTOM */
.viewer-bot{padding:14px 20px;border-top:1px solid #1a1a24;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0}
.vdot{width:7px;height:7px;border-radius:50%;background:#2a2a38;cursor:pointer;transition:.2s}
.vdot.on{background:#7c6af7;width:18px;border-radius:4px}

/* SCREENSHOT TIP */
.screenshot-tip{position:fixed;bottom:80px;right:20px;background:#1a1a2a;border:1px solid #2a2a3e;border-radius:10px;padding:10px 14px;font-size:11px;color:#888;z-index:200;max-width:180px;line-height:1.5;text-align:center}
.screenshot-tip strong{color:#a78bfa;display:block;margin-bottom:3px}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentDeck = null;
let currentSlide = 0;

// ═══════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════
function buildGallery() {
  const cards = document.getElementById('cards');
  cards.innerHTML = DECKS.map((deck, i) => `
    <div class="gcard" onclick="openViewer(${i})">
      <div class="gcard-thumb" style="background:linear-gradient(135deg,${deck.typeColor}15,${deck.typeColor}05)">
        <div class="big-num" style="color:${deck.typeColor}">${String(i+1).padStart(2,'0')}</div>
        <div class="thumb-content">
          <span class="thumb-icon">${deck.icon}</span>
          <div class="thumb-title">"${deck.title.substring(0,40)}${deck.title.length>40?'...':''}"</div>
        </div>
      </div>
      <div class="gcard-body">
        <div class="gcard-type" style="color:${deck.typeColor}">${deck.icon} ${deck.type}</div>
        <div class="gcard-name">${deck.title}</div>
        <div class="gcard-meta">
          <span class="gcard-slides">${deck.slides.length} slides</span>
          <button class="gcard-btn" style="background:${deck.typeColor}20;color:${deck.typeColor}">
            Abrir →
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
// VIEWER
// ═══════════════════════════════════════
function openViewer(deckIdx) {
  currentDeck = deckIdx;
  currentSlide = 0;
  const deck = DECKS[deckIdx];
  document.getElementById('vtitle').textContent = deck.title;
  document.getElementById('viewer').classList.add('open');
  document.getElementById('screenshotTip').style.display = 'block';
  buildSlides();
  goToSlide(0);
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('screenshotTip').style.display = 'none';
  currentDeck = null;
}

function buildSlides() {
  const deck = DECKS[currentDeck];
  const container = document.getElementById('slides');
  container.innerHTML = deck.slides.map((slide, i) => `
    <div class="slide" id="slide-${i}" style="background:${slide.bg}">
      ${slide.content}
    </div>
  `).join('');

  // Dots
  const dots = document.getElementById('viewerDots');
  dots.innerHTML = deck.slides.map((_, i) =>
    `<div class="vdot" id="vdot-${i}" onclick="goToSlide(${i})"></div>`
  ).join('');
}

function goToSlide(idx) {
  const deck = DECKS[currentDeck];
  if (idx < 0 || idx >= deck.slides.length) return;

  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.vdot').forEach(d => d.classList.remove('on'));

  const slideEl = document.getElementById('slide-' + idx);
  if (slideEl) slideEl.classList.add('active');

  const dotEl = document.getElementById('vdot-' + idx);
  if (dotEl) dotEl.classList.add('on');

  currentSlide = idx;
  document.getElementById('vcounter').textContent = `${idx + 1} / ${deck.slides.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === deck.slides.length - 1;
}

function nav(dir) {
  goToSlide(currentSlide + dir);
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!document.getElementById('viewer').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
  if (e.key === 'Escape') closeViewer();
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildGallery();
</script>
