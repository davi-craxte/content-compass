<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Compass · Davi Cardoso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
.nav{background:#111118;border-bottom:1px solid #22222e;padding:0 20px;display:flex;align-items:center;gap:4px;position:sticky;top:0;z-index:50}
.nav-logo{margin-right:auto;padding:14px 0;display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.nav-logo .ico{width:32px;height:32px;background:linear-gradient(135deg,#7c6af7,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.navbtn{border:none;background:none;color:#888;cursor:pointer;font-size:13px;font-weight:500;padding:16px 14px;border-bottom:2px solid transparent;transition:.15s}
.navbtn:hover{color:#e8e8f0}
.navbtn.on{color:#7c6af7;border-bottom-color:#7c6af7;font-weight:600}

/* SCREENS */
.screen{display:none;padding:24px 20px;max-width:760px;margin:0 auto}
.screen.on{display:block}

/* HOJE — hero card */
.today-card{border-radius:18px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;inset:0;opacity:.08;background:radial-gradient(circle at 80% 20%, #fff 0%, transparent 60%)}
.today-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding:4px 10px;border-radius:20px;background:rgba(0,0,0,.3)}
.today-badge .pulse{width:7px;height:7px;border-radius:50%;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.today-h{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px}
.today-sub{font-size:14px;opacity:.7;margin-bottom:20px}
.time-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:7px 16px;font-size:14px;font-weight:700;margin-bottom:20px}

/* CONTENT TABS */
.ctabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ctab{border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;background:rgba(0,0,0,.3);color:rgba(255,255,255,.5)}
.ctab:hover{color:#fff;background:rgba(0,0,0,.5)}
.ctab.on{color:#fff}

/* CONTENT AREA */
.content-area{background:rgba(0,0,0,.3);border-radius:12px;padding:18px;min-height:120px;transition:.15s}
.content-area pre{white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.8;color:#e8e8f0}
.slide-list{display:flex;flex-direction:column;gap:8px}
.slide-row{background:rgba(255,255,255,.05);border-radius:8px;padding:12px 14px;border-left:3px solid}
.slide-num{font-size:10px;font-weight:700;margin-bottom:4px;opacity:.6;text-transform:uppercase}
.slide-txt{font-size:13px;line-height:1.6}
.script-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.script-row:last-child{border:none}
.stag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.stxt{font-size:13px;line-height:1.6}
.tags-area{font-size:13px;line-height:1.9;color:#a78bfa}
.tip-box{font-size:13px;line-height:1.6;color:rgba(255,255,255,.7)}
.tip-box strong{color:#fff}

/* ACTION BUTTONS */
.actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.abtn{border:none;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.abtn-copy{background:rgba(255,255,255,.08);color:#e8e8f0;border:1px solid rgba(255,255,255,.12)}
.abtn-copy:hover{background:rgba(255,255,255,.14)}
.abtn-next{background:rgba(255,255,255,.06);color:#888;border:1px solid rgba(255,255,255,.08)}
.abtn-next:hover{color:#e8e8f0;background:rgba(255,255,255,.1)}
.abtn-done{background:#10b981;color:#fff}
.abtn-done:hover{background:#059669}
.abtn-undo{background:#1e1e2a;color:#10b981;border:1px solid #10b98140}
.done-check{margin-top:14px;background:#10b98115;border:1px solid #10b98140;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;color:#10b981;display:flex;align-items:center;gap:8px}

/* WEEK SCREEN */
.week-grid{display:flex;flex-direction:column;gap:10px}
.week-card{background:#111118;border:1px solid #22222e;border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s}
.week-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.week-card.today-wk{box-shadow:0 0 0 2px rgba(124,106,247,.4)}
.wk-head{display:flex;align-items:center;gap:14px;padding:14px 18px}
.wk-day{text-align:center;min-width:44px}
.wk-day .dn{font-size:11px;font-weight:700;text-transform:uppercase;opacity:.5;margin-bottom:2px}
.wk-day .dd{font-size:22px;font-weight:800}
.wk-info{flex:1}
.wk-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.wk-title{font-size:14px;font-weight:600;color:#e8e8f0}
.wk-right{display:flex;align-items:center;gap:8px}
.wk-time{font-size:12px;font-weight:600;background:#1e1e2a;border:1px solid #2a2a38;border-radius:6px;padding:4px 10px;color:#888}
.wk-check{font-size:18px;color:#10b981}
.wk-arrow{color:#444;font-size:16px;transition:.15s}
.week-card:hover .wk-arrow{color:#888}
.wk-body{display:none;border-top:1px solid #1a1a24;padding:16px 18px}
.wk-body.open{display:block}

/* GENERATE SCREEN */
.gen-intro{font-size:15px;color:#888;margin-bottom:24px}
.gen-types{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
@media(max-width:500px){.gen-types{grid-template-columns:repeat(2,1fr)}}
.gen-type-btn{border:none;border-radius:14px;padding:18px 12px;cursor:pointer;transition:.15s;text-align:center;border:2px solid transparent}
.gen-type-btn:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.1)}
.gen-type-btn.sel{border-color:rgba(255,255,255,.3)}
.gen-type-btn .icon{font-size:28px;margin-bottom:8px;display:block}
.gen-type-btn .label{font-size:12px;font-weight:700;color:#fff}
.gen-result{background:#111118;border:1px solid #22222e;border-radius:16px;padding:22px;margin-top:4px}
.gen-result-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.gen-result-head .type-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
.gen-result-head .fmt{font-size:12px;color:#888}
.gen-result-title{font-size:18px;font-weight:700;margin-bottom:16px;line-height:1.3}
.hidden{display:none}

/* CALENDAR SCREEN */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-header h2{font-size:18px;font-weight:700}
.cal-nav{display:flex;gap:4px}
.cal-nav button{background:#111118;border:1px solid #22222e;color:#888;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;transition:.15s}
.cal-nav button:hover{color:#e8e8f0;border-color:#3a3a4e}
.cal-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.cal-stat{background:#111118;border:1px solid #22222e;border-radius:10px;padding:12px 16px;flex:1;min-width:80px}
.cal-stat .v{font-size:22px;font-weight:800;color:#7c6af7}
.cal-stat .l{font-size:11px;color:#888;margin-top:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dh{text-align:center;font-size:10px;font-weight:600;color:#555;padding:5px 0;text-transform:uppercase}
.cal-dc{background:#111118;border:1px solid #22222e;border-radius:10px;padding:8px 6px;min-height:68px;cursor:pointer;transition:.15s;position:relative}
.cal-dc:hover{border-color:#3a3a4e;transform:translateY(-1px)}
.cal-dc.empty{background:transparent;border-color:transparent;cursor:default}
.cal-dc.empty:hover{transform:none;border-color:transparent}
.cal-dc.is-today{box-shadow:0 0 0 2px #7c6af7}
.cal-dc.is-posted{opacity:.55}
.cal-dc.is-posted::after{content:'✓';position:absolute;top:5px;right:6px;font-size:12px;color:#10b981;font-weight:700}
.cal-dc .cdn{font-size:13px;font-weight:700;margin-bottom:5px}
.cal-dc .cpill{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;display:inline-block;line-height:1.5}
.cal-dc .cico{font-size:14px;display:block;margin-top:3px}
.cal-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;background:#111118;border:1px solid #1e1e2a;padding:4px 10px;border-radius:16px}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* GUIDE */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.gcard{background:#111118;border:1px solid #22222e;border-radius:14px;padding:20px}
.gcard .gi{font-size:26px;margin-bottom:10px}
.gcard h3{font-size:14px;font-weight:700;margin-bottom:8px}
.gcard p{font-size:12px;color:#888;line-height:1.6;margin-bottom:10px}
.glist{list-style:none}
.glist li{font-size:12px;color:#888;padding:5px 0;border-bottom:1px solid #1a1a24;display:flex;gap:8px;line-height:1.5;align-items:flex-start}
.glist li:last-child{border:none}
.gb{color:#7c6af7;font-weight:700;flex-shrink:0}
.gstat{display:flex;align-items:center;gap:8px;background:#1a1a24;border-radius:8px;padding:10px;margin-top:8px}
.gsn{font-size:20px;font-weight:800;color:#7c6af7}
.gsl{font-size:11px;color:#888;line-height:1.4}
.ladder{display:flex;flex-direction:column;gap:6px}
.lrung{display:flex;align-items:center;gap:10px;background:#1a1a24;border-radius:8px;padding:10px}
.lrn{width:24px;height:24px;border-radius:50%;background:#7c6af7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lrt strong{font-size:12px;display:block}
.lrt span{font-size:11px;color:#888}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;transform:translateY(80px);opacity:0;transition:.3s;z-index:200;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
@media(min-width:600px){.moverlay{align-items:center}}
.moverlay.open{opacity:1;pointer-events:all}
.mbox{background:#14141c;border:1px solid #22222e;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s;padding:24px}
@media(min-width:600px){.mbox{border-radius:20px;transform:translateY(20px)}}
.moverlay.open .mbox{transform:translateY(0)}
.mbox-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mbox-close{background:#1e1e2a;border:1px solid #2a2a38;color:#888;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.mbox-close:hover{color:#e8e8f0}
</style>
</head>
<body>

<nav class="nav">

<div class="screen" id="s-guia">

<div class="moverlay" id="moverlay" onclick="closeMov(event)">

</div>

<div class="toast" id="toast"></div>

const NOW = new Date();
let calYear = NOW.getFullYear();
let calMonth = NOW.getMonth();
const posted = new Set(JSON.parse(localStorage.getItem('cc2_posted')||'[]'));
function savePosted(){ localStorage.setItem('cc2_posted',JSON.stringify([...posted])); }
function dkey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function typeId(day){ return ((day-1)%7)+1; }
function getType(day){ return TYPES[typeId(day)-1]; }
function getPost(tid,idx){ const p=POSTS[tid]||[]; return p[idx%p.length]; }
function todayPost(){ return getPost(typeId(NOW.getDate()),0); }
let modalDay=null;

// rotation state per day (which post index)
const rotState = JSON.parse(localStorage.getItem('cc2_rot')||'{}');
function saveRot(){ localStorage.setItem('cc2_rot',JSON.stringify(rotState)); }
function getRotIdx(dayKey){ return rotState[dayKey]||0; }
function nextRot(dayKey,typeId){
  const len=(POSTS[typeId]||[]).length;
  rotState[dayKey]=((getRotIdx(dayKey)+1)%len);
  saveRot();
}

// active content tab per section
let hojeCTab='tip';
let genCTab='tip';
let genSelType=null;
let genSelPost=null;

// ═══════════════════════════════
// NAV
// ═══════════════════════════════
function go(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='hoje') buildHoje();
  if(id==='semana') buildSemana();
  if(id==='gerar') buildGerar();
  if(id==='cal') buildCal();
  if(id==='guia') buildGuia();
}

// ═══════════════════════════════
// HOJE
// ═══════════════════════════════
function buildHoje(){
  const d=NOW.getDate();
  const tid=typeId(d);
  const type=getType(d);
  const c=hex(tid);
  const dk=dkey(NOW.getFullYear(),NOW.getMonth(),d);
  const pidx=getRotIdx(dk);
  const post=getPost(tid,pidx);
  const isDone=posted.has(dk);

  const wday=NOW.toLocaleDateString('pt-BR',{weekday:'long'});
  const dstr=NOW.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});

  const verbMap={
    'Foto':'postar uma foto',
    'Foto + Texto':'postar uma foto',
    'Carrossel':'criar um carrossel',
    'Reels / Foto':'gravar um Reels',
    'Stories':'postar nos stories'
  };
  const verb=verbMap[post.fmt||type.fmt]||'postar';

  document.getElementById('s-hoje').innerHTML=`
    <div class="today-card" style="background:${c}15;border:1px solid ${c}30">
      <div class="today-badge" style="color:${c}">
        <div class="pulse" style="background:${c}"></div>
        ${isDone?'JÁ POSTADO HOJE':'POST DE HOJE'}
      </div>
      <div class="today-h">Davi, ${type.time?`às ${type.time}`:'hoje'} você vai<br>${verb} sobre:</div>
      <div class="today-sub">"${post.title}"</div>
      ${type.time?`<div class="time-badge" style="border-color:${c}40">🕐 <strong>${type.time}</strong> &nbsp;·&nbsp; ${type.emoji} ${type.name} &nbsp;·&nbsp; ${type.fmt}</div>`:''}

      <div class="ctabs" id="hojeTabs">${buildCTabs(post,c,'hoje')}</div>
      <div class="content-area" id="hojeContent">${buildCContent(post,c,'hoje',hojeCTab)}</div>

      <div class="actions">
        <button class="abtn abtn-copy" onclick="copyText('hojeContent')">📋 Copiar</button>
        <button class="abtn abtn-next" onclick="hojeNextPost(${d},${tid},'${dk}')">🔄 Outro post</button>
        ${isDone
          ?`<button class="abtn abtn-undo" onclick="togglePostedHoje(${d},'${dk}')">↩ Desmarcar</button>`
          :`<button class="abtn abtn-done" onclick="togglePostedHoje(${d},'${dk}')">✓ Marcar como postado</button>`
        }
      </div>
      ${isDone?`<div class="done-check">✅ Postado! Excelente consistência, Davi.</div>`:''}
    </div>
  `;
}

function buildCTabs(post,c,prefix){
  const tabs=[];
  tabs.push({id:'tip',label:'💡 Dica'});
  if(post.slides) tabs.push({id:'slides',label:'🗂️ Slides'});
  if(post.script) tabs.push({id:'script',label:'🎬 Roteiro'});
  tabs.push({id:'caption',label:'✍️ Legenda'});
  tabs.push({id:'tags',label:'# Tags'});
  const active=prefix==='hoje'?hojeCTab:genCTab;
  return tabs.map(t=>`<button class="ctab ${active===t.id?'on':''}"
    style="${active===t.id?`background:${c}30;color:${c}`:''}"
    onclick="setCTab('${prefix}','${t.id}','${c}')">${t.label}</button>`).join('');
}

function buildCContent(post,c,prefix,tab){
  if(tab==='tip'){
    return `<div class="tip-box"><strong>💡 Como produzir:</strong><br><br>${(post.tip||'Crie um conteúdo visual de qualidade alinhado ao tema.').replace(/\n/g,'<br>')}</div>`;
  }
  if(tab==='slides'&&post.slides){
    return `<div class="slide-list">${post.slides.map(s=>`
      <div class="slide-row" style="border-color:${c}">
        <div class="slide-num" style="color:${c}">${s.num}</div>
        <div class="slide-txt">${s.txt.replace(/\n/g,'<br>')}</div>
      </div>`).join('')}</div>`;
  }
  if(tab==='script'&&post.script){
    return `<div class="script-block">${post.script.map(s=>`
      <div class="script-row">
        <span class="stag" style="background:${c}20;color:${c}">${s.tag}</span>
        <span class="stxt">${s.txt}</span>
      </div>`).join('')}</div>`;
  }
  if(tab==='caption'){
    return `<pre>${post.caption}</pre>`;
  }
  if(tab==='tags'){
    return `<div class="tags-area">${post.tags}</div>`;
  }
  return `<pre>${post.caption}</pre>`;
}

function setCTab(prefix,tab,c){
  if(prefix==='hoje') hojeCTab=tab;
  else genCTab=tab;
  const post=prefix==='hoje'?getPost(typeId(NOW.getDate()),getRotIdx(dkey(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()))):genSelPost;
  if(!post) return;
  document.getElementById(prefix+'Tabs').innerHTML=buildCTabs(post,c,prefix);
  document.getElementById(prefix+'Content').innerHTML=buildCContent(post,c,prefix,tab);
}

function copyText(id){
  const el=document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.innerText.replace(/^[💡🗂️🎬✍️#]\s.*\n\n/,''))
    .then(()=>toast('Copiado! 📋'));
}

function togglePostedHoje(day,dk){
  if(posted.has(dk)){ posted.delete(dk); toast('Desmarcado'); }
  else{ posted.add(dk); toast('Postado! 🔥 Mais um dia de consistência.'); }
  savePosted();
  buildHoje();
}

function hojeNextPost(day,tid,dk){
  nextRot(dk,tid);
  hojeCTab='tip';
  buildHoje();
  toast('Próximo post carregado! 🔄');
}

// ═══════════════════════════════
// SEMANA
// ═══════════════════════════════
function buildSemana(){
  const today=NOW.getDate();
  const yr=NOW.getFullYear();
  const mo=NOW.getMonth();
  // Find start of current week (Monday)
  const dow=(NOW.getDay()+6)%7; // 0=Mon
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(yr,mo,today-dow+i);
    const dd=d.getDate();
    const dm=d.getMonth();
    const dy=d.getFullYear();
    const isT=(dd===today&&dm===mo&&dy===yr);
    const dk=dkey(dy,dm,dd);
    const tid=typeId(dd);
    const type=getType(dd);
    const post=getPost(tid,getRotIdx(dk));
    const isDone=posted.has(dk);
    const c=hex(tid);
    const wn=d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','').toUpperCase();
    html+=`
    <div class="week-card ${isT?'today-wk':''}" style="border-left:3px solid ${c}">
      <div class="wk-head" onclick="toggleWeekCard(${i})">
        <div class="wk-day">
          <div class="dn">${wn}</div>
          <div class="dd" style="color:${c}">${dd}</div>
        </div>
        <div class="wk-info">
          <div class="wk-type" style="color:${c}">${type.emoji} ${type.name}</div>
          <div class="wk-title">${post.title}</div>
        </div>
        <div class="wk-right">
          ${type.time?`<div class="wk-time">🕐 ${type.time}</div>`:''}
          ${isDone?`<div class="wk-check">✓</div>`:''}
          <div class="wk-arrow" id="wa-${i}">›</div>
        </div>
      </div>
      <div class="wk-body" id="wb-${i}">
        <div class="ctabs">${buildCTabsMini(post,c,i)}</div>
        <div class="content-area" id="wc-${i}">${buildCContent(post,c,'wk'+i,'tip')}</div>
        <div class="actions" style="margin-top:12px">
          <button class="abtn abtn-copy" onclick="copyText('wc-${i}')">📋 Copiar</button>
          ${isDone
            ?`<button class="abtn abtn-undo" onclick="toggleWeekPosted(${dd},${dm},${dy},'${dk}',${i})">↩ Desmarcar</button>`
            :`<button class="abtn abtn-done" onclick="toggleWeekPosted(${dd},${dm},${dy},'${dk}',${i})">✓ Postado</button>`
          }
        </div>
      </div>
    </div>`;
  }
  document.getElementById('weekGrid').innerHTML=html;
}

let wkTabs={};
function buildCTabsMini(post,c,i){
  const prefix='wk'+i;
  const tabs=[{id:'tip',label:'💡'}];
  if(post.slides) tabs.push({id:'slides',label:'🗂️'});
  if(post.script) tabs.push({id:'script',label:'🎬'});
  tabs.push({id:'caption',label:'✍️ Legenda'});
  tabs.push({id:'tags',label:'# Tags'});
  const active=wkTabs[i]||'tip';
  return tabs.map(t=>`<button class="ctab ${active===t.id?'on':''}"
    style="${active===t.id?`background:${c}30;color:${c}`:''}"
    onclick="setWkTab(${i},'${t.id}','${c}')">${t.label}</button>`).join('');
}

function setWkTab(i,tab,c){
  const d=new Date(); const today=d.getDate();
  // Recalculate day for this card
  const dow=(NOW.getDay()+6)%7;
  const cd=new Date(NOW.getFullYear(),NOW.getMonth(),today-dow+i);
  const tid=typeId(cd.getDate());
  const dk=dkey(cd.getFullYear(),cd.getMonth(),cd.getDate());
  const post=getPost(tid,getRotIdx(dk));
  wkTabs[i]=tab;
  const prefix='wk'+i;
  document.getElementById('wc-'+i).innerHTML=buildCContent(post,c,prefix,tab);
  // rebuild tabs
  const wc=document.getElementById('wb-'+i);
  if(wc) wc.querySelector('.ctabs').innerHTML=buildCTabsMini(post,c,i);
}

let openWeekCard=null;
function toggleWeekCard(i){
  const body=document.getElementById('wb-'+i);
  const arrow=document.getElementById('wa-'+i);
  if(openWeekCard!==null&&openWeekCard!==i){
    const ob=document.getElementById('wb-'+openWeekCard);
    const oa=document.getElementById('wa-'+openWeekCard);
    if(ob)ob.classList.remove('open');
    if(oa)oa.textContent='›';
  }
  const isOpen=body.classList.toggle('open');
  arrow.textContent=isOpen?'⌄':'›';
  openWeekCard=isOpen?i:null;
}

function toggleWeekPosted(dd,dm,dy,dk,i){
  if(posted.has(dk)){ posted.delete(dk); toast('Desmarcado'); }
  else{ posted.add(dk); toast('Postado! ✅'); }
  savePosted();
  buildSemana();
}

// ═══════════════════════════════
// GERAR
// ═══════════════════════════════
function buildGerar(){
  let html='';
  TYPES.forEach(t=>{
    const c=hex(t.id);
    html+=`<button class="gen-type-btn" id="gbt-${t.id}"
      style="background:${c}15;border:1px solid ${c}30"
      onclick="genSelect(${t.id})">
      <span class="icon">${t.emoji}</span>
      <span class="label">${t.name}</span>
    </button>`;
  });
  document.getElementById('genTypes').innerHTML=html;
  document.getElementById('genResult').className='gen-result hidden';
}

function genSelect(tid){
  genSelType=tid;
  genCTab='tip';
  const c=hex(tid);
  document.querySelectorAll('.gen-type-btn').forEach(b=>{
    b.style.borderColor=b.id===`gbt-${tid}`?c:hex(parseInt(b.id.split('-')[1]))+'30';
    b.classList.toggle('sel',b.id===`gbt-${tid}`);
  });
  const posts=POSTS[tid]||[];
  const idx=Math.floor(Math.random()*posts.length);
  genSelPost=posts[idx];
  const type=TYPES[tid-1];
  const res=document.getElementById('genResult');
  res.className='gen-result';
  res.innerHTML=`
    <div class="gen-result-head">
      <span class="gen-result-head type-pill" style="background:${c}20;color:${c}">${type.emoji} ${type.name}</span>
      <span class="gen-result-head fmt">${type.fmt}</span>
    </div>
    <div class="gen-result-title">${genSelPost.title}</div>
    <div class="ctabs" id="genTabs">${buildCTabs(genSelPost,c,'gen')}</div>
    <div class="content-area" id="genContent">${buildCContent(genSelPost,c,'gen',genCTab)}</div>
    <div class="actions" style="margin-top:14px">
      <button class="abtn abtn-copy" onclick="copyText('genContent')">📋 Copiar</button>
      <button class="abtn abtn-next" onclick="genNext(${tid})">🔄 Gerar outro</button>
    </div>
  `;
}

let genIdx={};
function genNext(tid){
  const posts=POSTS[tid]||[];
  genIdx[tid]=((genIdx[tid]||0)+1)%posts.length;
  genSelPost=posts[genIdx[tid]];
  genCTab='tip';
  genSelect(tid);
  toast('Novo post gerado! 🔄');
}

// ═══════════════════════════════
// CALENDAR
// ═══════════════════════════════
function buildCal(){
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  document.getElementById('calTitle').textContent=
    cap(new Date(calYear,calMonth,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}));

  const dim=new Date(calYear,calMonth+1,0).getDate();
  let cnt=0;
  for(let d=1;d<=dim;d++) if(posted.has(dkey(calYear,calMonth,d))) cnt++;

  document.getElementById('calStats').innerHTML=`
    <div class="cal-stat"><div class="v">${cnt}</div><div class="l">Postados</div></div>
    <div class="cal-stat"><div class="v">${dim-cnt}</div><div class="l">Restantes</div></div>
    <div class="cal-stat"><div class="v">${dim}</div><div class="l">Total mês</div></div>
    <div class="cal-stat"><div class="v">${Math.round(dim/7)}</div><div class="l">Por semana</div></div>
  `;

  const first=(new Date(calYear,calMonth,1).getDay()+6)%7;
  let grid='';
  ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].forEach(d=>{grid+=`<div class="cal-dh">${d}</div>`;});
  for(let i=0;i<first;i++) grid+=`<div class="cal-dc empty"></div>`;

  for(let d=1;d<=dim;d++){
    const tid=typeId(d);
    const type=getType(d);
    const c=hex(tid);
    const k=dkey(calYear,calMonth,d);
    const isDone=posted.has(k);
    const isT=calYear===NOW.getFullYear()&&calMonth===NOW.getMonth()&&d===NOW.getDate();
    grid+=`<div class="cal-dc ${isDone?'is-posted':''} ${isT?'is-today':''}"
      onclick="openCalDay(${d})"
      style="border-left:3px solid ${c}">
      <div class="cdn">${d}</div>
      <span class="cpill" style="background:${c}20;color:${c}">${type.short}</span>
      <span class="cico">${type.emoji}</span>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=grid;

  let leg='';
  TYPES.forEach(t=>{
    leg+=`<div class="leg"><div class="leg-dot" style="background:${hex(t.id)}"></div>${t.emoji} ${t.name}</div>`;
  });
  document.getElementById('calLegend').innerHTML=leg;
}

function calNav(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  buildCal();
}

function openCalDay(day){
  modalDay=day;
  const tid=typeId(day);
  const type=getType(day);
  const c=hex(tid);
  const dk=dkey(calYear,calMonth,day);
  const pidx=getRotIdx(dk);
  const post=getPost(tid,pidx);
  const isDone=posted.has(dk);
  const dayStr=new Date(calYear,calMonth,day).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  document.getElementById('mTitle').innerHTML=`<span style="color:${c}">${type.emoji} ${type.name}</span>`;
  document.getElementById('mSub').textContent=`${dayStr}${type.time?' · '+type.time:''}`;

  let body=`<div class="ctabs">${buildCTabs(post,c,'mod')}</div>
    <div class="content-area" id="modContent">${buildCContent(post,c,'mod','tip')}</div>`;
  document.getElementById('mBody').innerHTML=body;

  const btn=document.getElementById('mDoneBtn');
  btn.textContent=isDone?'↩ Desmarcar':'✓ Marcar postado';
  btn.className=isDone?'abtn abtn-undo':'abtn abtn-done';
  btn.style.display='';

  document.getElementById('moverlay').classList.add('open');
}

// override setCTab for modal
const _setCTab=setCTab;
window.setCTab=function(prefix,tab,c){
  if(prefix==='mod'){
    const post=getPost(typeId(modalDay),getRotIdx(dkey(calYear,calMonth,modalDay)));
    document.getElementById('modContent').innerHTML=buildCContent(post,c,prefix,tab);
    document.getElementById('moverlay').querySelector('.ctabs').innerHTML=buildCTabs(post,c,'mod');
    // update active tab style
    document.getElementById('moverlay').querySelectorAll('.ctab').forEach(b=>{
      const isOn=b.getAttribute('onclick').includes(`'${tab}'`);
      b.classList.toggle('on',isOn);
      b.style.background=isOn?c+'30':'';
      b.style.color=isOn?c:'';
    });
  } else {
    _setCTab(prefix,tab,c);
  }
};

function mTogglePosted(){
  if(modalDay===null) return;
  const dk=dkey(calYear,calMonth,modalDay);
  if(posted.has(dk)){ posted.delete(dk); toast('Desmarcado'); }
  else{ posted.add(dk); toast('Postado! ✅'); }
  savePosted();
  buildCal();
  openCalDay(modalDay);
}

function closeMov(e){
  if(!e||e.target===document.getElementById('moverlay')){
    document.getElementById('moverlay').classList.remove('open');
  }
}

// TOAST
// ═══════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
